<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logistics</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <nav>
      <div class="logo">Logistics</div>
      <ul>
        <li><a href="#">Dashboard</a></li>
        <li><a href="#">Shipments</a></li>
        <li><a href="#">Inventory</a></li>
        <li><a href="#">Reports</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Logistics Platform</h1>
      <p>Track, manage, and optimize your supply chain.</p>
    </section>

    <section class="stats">
      <div class="card">
        <h3>Shipments</h3>
        <p class="number">0</p>
      </div>
      <div class="card">
        <h3>In Transit</h3>
        <p class="number">0</p>
      </div>
      <div class="card">
        <h3>Delivered</h3>
        <p class="number">0</p>
      </div>
      <div class="card">
        <h3>Pending</h3>
        <p class="number">0</p>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
